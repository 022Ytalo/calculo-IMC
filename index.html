<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de IMC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Calculadora de IMC</h1>

        <div class="input-group">
            <label for="nome">Nome</label>
            <input type="text" id="nome" placeholder="Digite seu nome">
        </div>

        <div class="input-group">
            <label for="telefone">WhatsApp</label>
            <input type="tel" id="telefone" placeholder="Ex: 5522999999999">
        </div>

        <div class="input-group">
            <label for="peso">Peso (kg)</label>
            <input type="number" id="peso" step="0.1" placeholder="Ex: 75">
        </div>

        <div class="input-group">
            <label for="altura">Altura (m)</label>
            <input type="number" id="altura" step="0.01" placeholder="Ex: 1.75">
        </div>

        <button onclick="calcularIMC()">
            Calcular e Enviar no WhatsApp
        </button>

        <div class="resultado" id="resultado">
            <h2 id="imcTexto"></h2>
            <p id="classificacao"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
